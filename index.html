  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ══════════════════════════════════════════════
       SEO METADATA — edit these lines
       ══════════════════════════════════════════════ -->
  <title>Your Name</title>
  <meta name="description" content="One sentence about who you are." />
  <meta property="og:title"       content="Your Name" />
  <meta property="og:description" content="One sentence about who you are." />

  <!-- ══════════════════════════════════════════════ -->

  <!--
    FONT CHOICE: Hanken Grotesk (free, closest to Jonathan's neutral Swiss grotesque)
    To try alternatives, replace "Hanken+Grotesk" in the Google Fonts URL with:
      "DM+Sans"    — warmer, a little more personality
      "Figtree"    — geometric, clean, friendly
    And update --font-latin below to match.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet" />

  <!--
    CUSTOM FONTS: If you'd rather use your own .otf / .ttf files,
    comment out the Google Fonts link above and uncomment these:

    @font-face {
      font-family: 'FedraSans';
      src: url('FedraSansProBook.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    (etc. — see previous version for full @font-face blocks)
  -->

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --text:  #111;
      --bg:    #f7f5f0;
      --muted: #888;
      --rule:  #ccc;

      /* Horizontal padding only — no max-width, text runs full width */
      --ph: 2.5rem;
    }

    /* ── Fonts ── */
    :root {
      --font-latin:  'Hanken Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-arabic: 'Noto Naskh Arabic', serif;
      --font-sr:     'GT-Walsheim', 'Hanken Grotesk', sans-serif; /* falls back if TTF not uploaded */
    }

    @font-face {
      font-family: 'GT-Walsheim';
      src: url('GT-Walsheim-Pro-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Lenos';
      src: url('LenosMedium.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* ── Base ── */
    html { font-size: 18px; }

    body {
      font-family: var(--font-latin);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      /* Text starts right at the top — like Körner */
      padding: 2rem var(--ph) 0;
    }

    html[lang="ar"] body {
      font-family: 'Lenos', var(--font-arabic);
      line-height: 1.85;
      font-size: 1.05rem;
    }

    html[lang="sr"] body {
      font-family: 'GT-Walsheim', var(--font-latin);
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    /* ── Bio — full width, no max-width constraint ── */
    #bio {
      /* Size comparable to Körner: large enough to feel editorial,
         small enough to not be overwhelming */
      font-size: clamp(1.1rem, 2.4vw, 1.55rem);
      /* No max-width: text stretches from padding to padding */
    }
    #bio p { margin-bottom: 0.2em; }

    /* ── Trigger words ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.4; }
    .trigger.active { opacity: 0.4; }

    /* ── Detail panel ── */
    #detail-area {
      display: none;
      margin-top: 2.5rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--rule);
    }
    #detail-area.visible {
      display: block;
      animation: drop 0.2s ease;
    }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-heading {
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }
    html[lang="ar"] .panel-heading { letter-spacing: 0; }

    #detail-area p   { font-size: 0.92rem; margin-bottom: 0.4rem; }
    #detail-area a   { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

    /* ── Project list ── */
    .project-list    { list-style: none; padding: 0; }
    .project-list li { display: flex; gap: 1.5rem; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .project-list .year {
      color: var(--muted);
      min-width: 4rem;
      flex-shrink: 0;
    }
    .proj-trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .proj-trigger:hover { opacity: 0.4; }

    /* ── Project detail ── */
    .proj-back {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 1rem;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .proj-back:hover { opacity: 0.5; }

    .proj-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.4rem; }
    .proj-desc  { font-size: 0.85rem; color: #555; margin-bottom: 1.2rem; max-width: 52ch; }

    /* ── Image grid (desktop) ── */
    .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; max-width: 640px; }
    .img-grid img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      display: block; background: #e0ddd7;
    }
    .img-grid img:last-child:nth-child(odd) { grid-column: 1 / -1; }

    /* ── Carousel (mobile) ── */
    .img-carousel {
      display: none;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0.5rem;
    }
    .img-carousel::-webkit-scrollbar { display: none; }
    .img-carousel img {
      flex-shrink: 0; width: 80vw; max-width: 320px;
      aspect-ratio: 4/3; object-fit: cover;
      scroll-snap-align: start; background: #e0ddd7;
    }

    .carousel-dots {
      display: none; justify-content: center;
      gap: 0.35rem; margin-top: 0.6rem;
    }
    .carousel-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--rule); cursor: pointer;
      transition: background 0.2s;
    }
    .carousel-dots span.active { background: var(--text); }

    @media (max-width: 600px) {
      .img-grid      { display: none; }
      .img-carousel  { display: flex; }
      .carousel-dots { display: flex; }
    }

    /* ══════════════════════════════════════════════
       FOOTER — three zones: left · centre · right
       ══════════════════════════════════════════════ */
    footer {
      margin-top: 4rem;
      padding: 1.5rem var(--ph) 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 1rem;
    }

    /* Left: contact links */
    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .footer-left a { color: inherit; text-decoration: none; }
    .footer-left a:hover { text-decoration: underline; }

    /* Centre: logo — links to index page */
    .footer-centre { display: flex; justify-content: center; align-items: flex-end; }

    .logo-link {
      display: block;
      width: 36px;
      height: 36px;
      opacity: 0.5;
      transition: opacity 0.2s;
      /* href="/" links to index — works on GitHub Pages */
    }
    .logo-link:hover { opacity: 1; }
    .logo-link svg, .logo-link img { width: 100%; height: 100%; display: block; }

    /* Right: language switcher */
    .footer-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-btn {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--muted);
      transition: color 0.15s;
    }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { font-size: 0.78rem; color: var(--rule); user-select: none; }

    /* ── Mobile footer ── */
    @media (max-width: 640px) {
      :root { --ph: 1.4rem; }
      html  { font-size: 16px; }
      body  { padding-top: 1.5rem; }

      footer {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        padding-left: var(--ph);
        padding-right: var(--ph);
      }
      .footer-centre {
        grid-column: 1 / -1;
        justify-content: flex-start;
        margin-bottom: 0.75rem;
      }
    }

    @media (max-width: 400px) {
      :root { --ph: 1rem; }
    }
  </style>
</head>

    ],
  },
};

// ════════════════════════════════════════════════════════════════
//  ENGINE
// ════════════════════════════════════════════════════════════════

let currentLang   = 'en';
let currentDetail = null;

const bioEl       = document.getElementById('bio');
const detailEl    = document.getElementById('detail-area');
const footerLinks = document.getElementById('footer-links');
const htmlEl      = document.documentElement;

function projectsListHTML(lang) {
  const t = CONTENT[lang];
  const headings = { en: 'Projects', de: 'Projekte', ar: 'المشاريع', sr: 'Пројекти' };
  const rows = t.projects.map(p =>
    `<li><span class="year">${p.year}</span><span class="proj-trigger" data-proj="${p.key}">${p.title}</span></li>`
  ).join('');
  return `<p class="panel-heading">${headings[lang]}</p><ul class="project-list">${rows}</ul>`;
}

function projectPanelHTML(projKey, lang) {
  const t    = CONTENT[lang];
  const proj = t.projects.find(p => p.key === projKey);
  if (!proj) return '';
  const imgs = PROJECT_IMAGES[projKey] || [];
  const grid     = imgs.map(s => `<img src="${s}" alt="${proj.title}" loading="lazy">`).join('');
  const carousel = imgs.map(s => `<img src="${s}" alt="${proj.title}" loading="lazy">`).join('');
  const dots     = imgs.map((_, i) => `<span class="${i===0?'active':''}" data-dot="${i}"></span>`).join('');
  return `
    <button class="proj-back" id="proj-back-btn">${t.backLabel}</button>
    <p class="proj-title">${proj.title}</p>
    <p class="proj-desc">${proj.desc}</p>
    <div class="img-grid">${grid}</div>
    <div class="img-carousel" id="proj-carousel">${carousel}</div>
    <div class="carousel-dots" id="carousel-dots">${dots}</div>`;
}

function openDetail(key) {
  let html = '';
  if (key === 'projects') {
    html = projectsListHTML(currentLang);
  } else {
    const d = CONTENT[currentLang].details[key];
    if (d) html = `<p class="panel-heading">${d.heading}</p>${d.html}`;
  }
  if (!html) return;

  detailEl.innerHTML = html;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  detailEl.querySelectorAll('.proj-trigger').forEach(el =>
    el.addEventListener('click', () => openProjectPanel(el.dataset.proj))
  );
}

function openProjectPanel(projKey) {
  detailEl.innerHTML = projectPanelHTML(projKey, currentLang);
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  document.getElementById('proj-back-btn')?.addEventListener('click', () => openDetail('projects'));

  const carousel = document.getElementById('proj-carousel');
  const dotsWrap = document.getElementById('carousel-dots');
  if (carousel && dotsWrap) {
    const dots = dotsWrap.querySelectorAll('span');
    carousel.addEventListener('scroll', () => {
      const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }, { passive: true });
    dots.forEach((dot, i) =>
      dot.addEventListener('click', () =>
        carousel.scrollTo({ left: i * carousel.offsetWidth, behavior: 'smooth' })
      )
    );
  }
}

function onTriggerClick(key) {
  if (currentDetail === key) {
    currentDetail = null;
    detailEl.classList.remove('visible');
    document.querySelectorAll('.trigger').forEach(el => el.classList.remove('active'));
  } else {
    currentDetail = key;
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === key)
    );
    openDetail(key);
  }
}

function render(lang) {
  const t = CONTENT[lang];
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  bioEl.innerHTML    = t.bio.map(p => `<p>${p}</p>`).join('');
  footerLinks.innerHTML = t.footer.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

  document.querySelectorAll('.trigger').forEach(el =>
    el.addEventListener('click', () => onTriggerClick(el.dataset.key))
  );

  if (currentDetail) {
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === currentDetail)
    );
    openDetail(currentDetail);
  } else {
    detailEl.classList.remove('visible');
  }

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );
}

document.querySelectorAll('.lang-btn').forEach(btn =>
  btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(currentLang); })
);

render('en');
</script>
</body>
</html>

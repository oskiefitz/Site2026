  <style>
    /* ═══════════════════════════════════════════════════════════
       FONT SWAP — this is the only place you need to touch fonts
       ═══════════════════════════════════════════════════════════

       To change the English/Latin font:
         1. Upload your .otf or .ttf file to the root of your repo
            (same folder as index.html)
         2. Change the src URL on line ~40 below to match the filename
            e.g.  url('MyNewFont.otf') format('opentype')
                  url('MyNewFont.ttf') format('truetype')
         3. Change --font-latin on line ~55 to 'MyNewFont'
         That's it. Three lines, all clearly marked with ← EDIT.

       To change the Arabic font: same process, but edit the
         @font-face for 'Lenos' and --font-arabic instead.

       To change the Serbian font: edit the @font-face for
         'GT-Walsheim' and --font-sr.
    ═══════════════════════════════════════════════════════════ */

    /* English / Latin — upload your .otf here */
    @font-face {
      font-family: 'LatinFont';
      src: url('ABCOtto-Regular-Trial.otf') format('opentype'); /* ← EDIT: change filename */
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* Arabic */
    @font-face {
      font-family: 'Lenos';
      src: url('LenosMedium.otf') format('opentype'); /* ← EDIT if you swap Arabic font */
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* Serbian / Cyrillic */
    @font-face {
      font-family: 'GT-Walsheim';
      src: url('GT-Walsheim-Pro-Black.ttf') format('truetype'); /* ← EDIT if you swap Serbian font */
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* ← EDIT: change 'LatinFont' to your new font-family name after uploading */
      --font-latin:  'LatinFont', 'Hanken Grotesk', 'Helvetica Neue', sans-serif;
      --font-arabic: 'Lenos', 'Noto Naskh Arabic', serif;
      --font-sr:     'GT-Walsheim', 'Hanken Grotesk', sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:        #111;
      --bg:          #f7f5f0;
      --muted:       #888;
      --rule:        #ccc;
      --ph:          1.2rem;   /* horizontal padding — tight like Körner */
      --footer-h:    2.75rem;  /* height reserved for fixed footer */
    }

    html { font-size: 18px; }

    body {
      font-family: var(--font-latin);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1.2rem var(--ph) 0;
      /* Make room so content never hides behind fixed footer */
      padding-bottom: calc(var(--footer-h) + 1.5rem);
    }

    html[lang="ar"] body { font-family: var(--font-arabic); line-height: 1.85; font-size: 1.05rem; }
    html[lang="sr"] body { font-family: var(--font-sr);     line-height: 1.4;  letter-spacing: -0.01em; }

    /* ── Bio: single continuous paragraph, slightly larger ── */
    #bio {
      /* Bumped up from 1.1–1.55rem to 1.25–1.75rem */
      font-size: clamp(1.25rem, 2.8vw, 1.75rem);
    }
    #bio p { display: inline; }
    #bio p::after { content: ' '; }

    /* ── Triggers ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.4; }
    .trigger.active { opacity: 0.4; }

    /* ── Detail panel ── */
    #detail-area {
      display: none;
      /* Tight — sits just after the bio text, no border, no big gap */
      margin-top: 0.35em;
      padding-top: 0;
      border-top: none;
      /* Everything inside is muted grey */
      color: var(--muted);
    }
    #detail-area.visible { display: block; animation: drop 0.15s ease; }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-heading {
      font-size: 0.66rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    html[lang="ar"] .panel-heading { letter-spacing: 0; }

    #detail-area p { font-size: 0.9rem; margin-bottom: 0.3rem; color: var(--muted); }
    #detail-area a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
    #detail-area a:hover { color: var(--text); }

    .item-list      { list-style: none; padding: 0; }
    .item-list li   { display: flex; gap: 1.5rem; margin-bottom: 0.25rem; font-size: 0.9rem; align-items: baseline; color: var(--muted); }
    .item-list .year { color: var(--muted); min-width: 4rem; flex-shrink: 0; opacity: 0.7; }

    /* Philology list — no year column, no indent */
    .plain-list     { list-style: none; padding: 0; }
    .plain-list li  { margin-bottom: 0.25rem; font-size: 0.9rem; color: var(--muted); }

    .sub-trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .sub-trigger:hover { opacity: 0.4; }

    .sub-back {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 1rem;
      background: none; border: none;
      padding: 0; font-family: inherit;
      transition: opacity 0.15s;
    }
    .sub-back:hover { opacity: 0.5; }

    .sub-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.35rem; color: var(--muted); }
    .sub-desc  { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.1rem; max-width: 52ch; }

    /* Image grid */
    .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; max-width: 600px; }
    .img-grid img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #e0ddd7; }
    .img-grid img:last-child:nth-child(odd) { grid-column: 1 / -1; }

    /* Carousel */
    .img-carousel {
      display: none;
      overflow-x: scroll; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0.5rem;
    }
    .img-carousel::-webkit-scrollbar { display: none; }
    .img-carousel img {
      flex-shrink: 0; width: 80vw; max-width: 320px;
      aspect-ratio: 4/3; object-fit: cover;
      scroll-snap-align: start; background: #e0ddd7;
    }
    .carousel-dots { display: none; justify-content: center; gap: 0.35rem; margin-top: 0.6rem; }
    .carousel-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--rule); cursor: pointer; transition: background 0.2s; }
    .carousel-dots span.active { background: var(--text); }

    @media (max-width: 600px) {
      .img-grid      { display: none; }
      .img-carousel  { display: flex; }
      .carousel-dots { display: flex; }
    }

    /* ═══════════════════════════════════════════════════════════
       FIXED FOOTER
       Always visible at the bottom — never needs scrolling.
       Three zones: email+github LEFT · logo CENTRE · lang RIGHT
    ═══════════════════════════════════════════════════════════ */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--footer-h);
      background: var(--bg);

      /* Thin top border so it doesn't bleed into content */
      border-top: 1px solid var(--rule);

      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 var(--ph);
      gap: 0.5rem;

      /* Sit above page content */
      z-index: 100;
    }

    /* LEFT: email + github */
    .footer-left {
      display: flex;
      gap: 1rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .footer-left a { color: inherit; text-decoration: none; white-space: nowrap; }
    .footer-left a:hover { text-decoration: underline; }

    /* CENTRE: logo */
    .footer-centre { display: flex; justify-content: center; }
    .logo-link {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      opacity: 0.4; transition: opacity 0.2s;
    }
    .logo-link:hover { opacity: 1; }
    .logo-link svg, .logo-link img { width: 100%; height: 100%; display: block; }

    /* RIGHT: language switcher */
    .footer-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.45rem;
    }
    .lang-btn {
      cursor: pointer; background: none; border: none; padding: 0;
      font-family: inherit; font-size: 0.72rem; color: var(--muted);
      transition: color 0.15s;
    }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { font-size: 0.72rem; color: var(--rule); user-select: none; }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      :root { --ph: 1rem; --footer-h: 2.5rem; }
      html  { font-size: 16px; }
      /* Collapse email label on very small screens */
      .footer-left .long-label { display: none; }
    }
  </style>
</head>

// ═══════════════ ENGINE ═══════════════

let currentLang   = 'en';
let currentDetail = null;

const bioEl       = document.getElementById('bio');
const detailEl    = document.getElementById('detail-area');
const footerLinks = document.getElementById('footer-links');
const htmlEl      = document.documentElement;

function imageSubPanelHTML(key, title, desc, parentKey) {
  const imgs      = IMAGES[key] || [];
  const backLabel = CONTENT[currentLang].backLabel[parentKey] || '←';
  const grid      = imgs.map(s => `<img src="${s}" alt="${title}" loading="lazy">`).join('');
  const carousel  = imgs.map(s => `<img src="${s}" alt="${title}" loading="lazy">`).join('');
  const dots      = imgs.map((_, i) => `<span class="${i===0?'active':''}" data-dot="${i}"></span>`).join('');
  return `
    <button class="sub-back" data-parent="${parentKey}">${backLabel}</button>
    <p class="sub-title">${title}</p>
    ${desc ? `<p class="sub-desc">${desc}</p>` : ''}
    <div class="img-grid">${grid}</div>
    <div class="img-carousel" id="sub-carousel">${carousel}</div>
    <div class="carousel-dots" id="sub-dots">${dots}</div>`;
}

function attachCarousel() {
  const carousel = document.getElementById('sub-carousel');
  const dotsWrap = document.getElementById('sub-dots');
  if (!carousel || !dotsWrap) return;
  const dots = dotsWrap.querySelectorAll('span');
  carousel.addEventListener('scroll', () => {
    const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
  dots.forEach((dot, i) =>
    dot.addEventListener('click', () =>
      carousel.scrollTo({ left: i * carousel.offsetWidth, behavior: 'smooth' })
    )
  );
}

function openDetail(key) {
  const d = CONTENT[currentLang].details[key];
  if (!d) return;

  let html = '';  /* no heading */

  if (d.type === 'html') {
    html += d.html;
  } else if (d.type === 'projects') {
    const rows = d.items.map(item =>
      `<li><span class="year">${item.year}</span><span class="sub-trigger" data-key="${item.key}" data-parent="${key}" data-title="${item.title}" data-desc="${item.desc}">${item.title}</span></li>`
    ).join('');
    html += `<ul class="item-list">${rows}</ul>`;
  } else if (d.type === 'philology') {
    /* No year column — use a simpler list class with no left indent */
    const rows = d.items.map(item => {
      if (item.type === 'link') {
        return `<li><a href="${item.href}" target="_blank" rel="noopener">${item.title}</a></li>`;
      }
      return `<li><span class="sub-trigger" data-key="${item.key}" data-parent="${key}" data-title="${item.title}" data-desc="${item.desc||''}">${item.title}</span></li>`;
    }).join('');
    html += `<ul class="plain-list">${rows}</ul>`;
  }

  detailEl.innerHTML = html;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  detailEl.querySelectorAll('.sub-trigger').forEach(el => {
    el.addEventListener('click', () => {
      detailEl.innerHTML = imageSubPanelHTML(el.dataset.key, el.dataset.title, el.dataset.desc, el.dataset.parent);
      detailEl.classList.remove('visible');
      void detailEl.offsetWidth;
      detailEl.classList.add('visible');
      attachCarousel();
      detailEl.querySelector('.sub-back')?.addEventListener('click', e => {
        openDetail(e.target.dataset.parent);
      });
    });
  });
}

function onTriggerClick(key) {
  if (currentDetail === key) {
    currentDetail = null;
    detailEl.classList.remove('visible');
    document.querySelectorAll('.trigger').forEach(el => el.classList.remove('active'));
  } else {
    currentDetail = key;
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === key)
    );
    openDetail(key);
  }
}

function render(lang) {
  const t = CONTENT[lang];
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  bioEl.innerHTML       = `<p>${t.bio}</p>`;
  footerLinks.innerHTML = t.footer.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

  document.querySelectorAll('.trigger').forEach(el =>
    el.addEventListener('click', () => onTriggerClick(el.dataset.key))
  );

  if (currentDetail) {
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === currentDetail)
    );
    openDetail(currentDetail);
  } else {
    detailEl.classList.remove('visible');
  }

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );
}

document.querySelectorAll('.lang-btn').forEach(btn =>
  btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(currentLang); })
);

render('en');
</script>

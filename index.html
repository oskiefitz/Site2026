  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

       SEO METADATA — edit these lines
       ══════════════════════════════════════════════ -->
  <title>Your Name</title>
  <meta name="description" content="One sentence about who you are." />
  <meta property="og:title"       content="Your Name" />
  <meta property="og:description" content="One sentence about who you are." />
  <meta property="og:type"        content="website" />

  <!-- ══════════════════════════════════════════════ -->

  <style>
    /* ══════════════════════════════════════════════
       FONTS
       Upload these files to the root of your repo
       (same folder as index.html) and they will
       load automatically — no internet needed.
       ══════════════════════════════════════════════ */
    @font-face {
      font-family: 'FedraSans';
      src: url('FedraSansProBook.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Lenos';
      src: url('LenosMedium.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'GTWalsheim';
      src: url('GT-Walsheim-Pro-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }
    /* Fallbacks while fonts load (similar rhythm) */
    :root {
      --font-latin:  'FedraSans', 'Gill Sans', 'Trebuchet MS', sans-serif;
      --font-arabic: 'Lenos', 'Noto Naskh Arabic', serif;
      --font-sr:     'GTWalsheim', 'Impact', sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --text:    #111;
      --bg:      #f7f5f0;
      --muted:   #888;
      --rule:    #ccc;
      --ph:      3.5rem;    /* horizontal padding — big, like Körner */
      --pv:      3rem;      /* vertical padding */
    }

    /* ── Base — large, left-aligned, no centring ── */
    html { font-size: 18px; }

    body {
      font-family: var(--font-latin);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      padding: var(--pv) var(--ph) 0;
      /* No max-width — text runs to edge with padding only */
    }

    /* Language-specific font switching */
    html[lang="ar"] body { font-family: var(--font-arabic); line-height: 1.85; }
    html[lang="sr"] body { font-family: var(--font-sr);     line-height: 1.4;  letter-spacing: -0.01em; }

    /* ── Name heading ── */
    h1 {
      font-size: clamp(1rem, 2vw, 1.1rem);
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.01em;
    }
    html[lang="sr"] h1 { font-family: var(--font-sr); }

    /* ── Bio — LARGE text like Körner ── */
    #bio {
      font-size: clamp(1.45rem, 3.2vw, 2.1rem);
      max-width: 820px;  /* comfortable reading line at large size */
    }
    #bio p { margin-bottom: 0.2em; }

    /* ── Trigger words ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.4; }
    .trigger.active { opacity: 0.4; }

    /* ── Detail panel — below all bio text ── */
    #detail-area {
      display: none;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      max-width: 580px;
    }
    #detail-area.visible {
      display: block;
      animation: drop 0.2s ease;
    }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-heading {
      font-size: 0.7rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--muted);
      margin-bottom: 0.9rem;
      font-family: var(--font-latin); /* headings always in latin font */
    }
    html[lang="ar"] .panel-heading { letter-spacing: 0; font-family: var(--font-arabic); }
    html[lang="sr"] .panel-heading { font-family: var(--font-sr); letter-spacing: 0; }

    #detail-area p {
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
    }
    #detail-area a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Project list ── */
    .project-list      { list-style: none; padding: 0; }
    .project-list li   { display: flex; gap: 1.5rem; margin-bottom: 0.3rem; font-size: 0.92rem; }
    .project-list .year {
      color: var(--muted);
      min-width: 4rem;
      flex-shrink: 0;
    }
    .proj-trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .proj-trigger:hover { opacity: 0.4; }

    /* ── Project detail ── */
    .proj-back {
      display: inline-block;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 1.1rem;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .proj-back:hover { opacity: 0.5; }

    .proj-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    .proj-desc {
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 1.25rem;
      max-width: 44ch;
    }

    /* ── Image grid (desktop ≥ 601px) ── */
    .img-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .img-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #e0ddd7;
    }
    .img-grid img:last-child:nth-child(odd) { grid-column: 1 / -1; }

    /* ── Carousel (mobile ≤ 600px) ── */
    .img-carousel {
      display: none;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0.5rem;
    }
    .img-carousel::-webkit-scrollbar { display: none; }
    .img-carousel img {
      flex-shrink: 0;
      width: 80vw;
      max-width: 320px;
      aspect-ratio: 4/3;
      object-fit: cover;
      scroll-snap-align: start;
      background: #e0ddd7;
    }

    .carousel-dots {
      display: none;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 0.65rem;
    }
    .carousel-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--rule);
      cursor: pointer;
      transition: background 0.2s;
    }
    .carousel-dots span.active { background: var(--text); }

    @media (max-width: 600px) {
      .img-grid          { display: none; }
      .img-carousel      { display: flex; }
      .carousel-dots     { display: flex; }
    }

    /* ══════════════════════════════════════════════
       FOOTER — three zones: left · centre · right
       Sits at the bottom of the page (not fixed)
       ══════════════════════════════════════════════ */
    footer {
      margin-top: 4rem;
      padding: 1.5rem var(--ph) 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 1rem;
    }

    /* Left: email + github */
    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .footer-left a { color: inherit; text-decoration: none; }
    .footer-left a:hover { text-decoration: underline; }

    /* Centre: logo */
    .footer-centre {
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    .logo-wrap {
      width: 40px;
      height: 40px;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    .logo-wrap:hover { opacity: 1; }

    /* Right: language switcher */
    .footer-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.55rem;
    }

    .lang-btn {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 0.15s;
      line-height: 1;
    }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { font-size: 0.8rem; color: var(--rule); user-select: none; }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      :root { --ph: 1.5rem; --pv: 2.25rem; }
      html  { font-size: 17px; }

      footer {
        /* Stack: logo top-centre, then left/right side by side */
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        padding-left: var(--ph);
        padding-right: var(--ph);
      }
      .footer-centre {
        grid-column: 1 / -1;
        margin-bottom: 1rem;
      }
      .footer-right { justify-content: flex-end; }
    }

    @media (max-width: 420px) {
      :root { --ph: 1.1rem; }
      html  { font-size: 16px; }
    }
  </style>
</head>

      location:  { heading: 'Локација',     html: `<p>Оксфорд, Енглеска</p><p style="color:var(--muted);font-size:0.88rem;">51° 45′ N · 1° 15′ W</p>` },
      education: { heading: 'Образовање',   html: `<ul class="project-list"><li><span class="year">2022–</span><span>Ваш студиј, Ваш универзитет</span></li><li><span class="year">2019–22</span><span>Претходна квалификација, Институција</span></li></ul>` },
      work:      { heading: 'Искуство',     html: `<ul class="project-list"><li><span class="year">2024</span><span>Позиција, Организација</span></li><li><span class="year">2023</span><span>Позиција, Организација</span></li></ul>` },
      interests: { heading: 'Интересовања', html: `<p>Тема прва, тема друга, тема трећа. Реченица или две о ономе шта те заиста занима.</p>` },
      contact:   { heading: 'Контакт',      html: `<p><a href="mailto:you@example.com">you@example.com</a></p><p><a href="https://github.com/yourusername" target="_blank">GitHub</a></p>` },
    },

    footer: [
      { label: 'you@example.com', href: 'mailto:you@example.com' },
      { label: 'GitHub',          href: 'https://github.com/yourusername' },
    ],
  },
};

// ════════════════════════════════════════════════════════════════
//  ENGINE
// ════════════════════════════════════════════════════════════════

let currentLang   = 'en';
let currentDetail = null;

const bioEl      = document.getElementById('bio');
const detailEl   = document.getElementById('detail-area');
const nameEl     = document.getElementById('site-name');
const footerLinks = document.getElementById('footer-links');
const htmlEl     = document.documentElement;

// ── Build HTML for the projects list panel ──
function projectsListHTML(lang) {
  const t = CONTENT[lang];
  const rows = t.projects.map(p =>
    `<li>
      <span class="year">${p.year}</span>
      <span class="proj-trigger" data-proj="${p.key}">${p.title}</span>
    </li>`
  ).join('');
  const heading = { en: 'Projects', de: 'Projekte', ar: 'المشاريع', sr: 'Пројекти' }[lang];
  return `<p class="panel-heading">${heading}</p><ul class="project-list">${rows}</ul>`;
}

// ── Build HTML for a single project panel ──
function projectPanelHTML(projKey, lang) {
  const t    = CONTENT[lang];
  const proj = t.projects.find(p => p.key === projKey);
  if (!proj) return '';
  const imgs = PROJECT_IMAGES[projKey] || [];

  const gridImgs     = imgs.map(s => `<img src="${s}" alt="${proj.title}" loading="lazy">`).join('');
  const carouselImgs = imgs.map(s => `<img src="${s}" alt="${proj.title}" loading="lazy">`).join('');
  const dots         = imgs.map((_, i) => `<span class="${i===0?'active':''}" data-dot="${i}"></span>`).join('');

  return `
    <button class="proj-back" id="proj-back-btn">${t.backLabel}</button>
    <p class="proj-title">${proj.title}</p>
    <p class="proj-desc">${proj.desc}</p>
    <div class="img-grid">${gridImgs}</div>
    <div class="img-carousel" id="proj-carousel">${carouselImgs}</div>
    <div class="carousel-dots" id="carousel-dots">${dots}</div>`;
}

// ── Show a named detail panel (or projects list) ──
function openDetail(key) {
  let html = '';
  if (key === 'projects') {
    html = projectsListHTML(currentLang);
  } else if (CONTENT[currentLang].details[key]) {
    const d = CONTENT[currentLang].details[key];
    html = `<p class="panel-heading">${d.heading}</p>${d.html}`;
  }
  if (!html) return;

  detailEl.innerHTML = html;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  // Attach project-name clicks within the list
  detailEl.querySelectorAll('.proj-trigger').forEach(el => {
    el.addEventListener('click', () => openProjectPanel(el.dataset.proj));
  });
}

// ── Open a specific project's image panel ──
function openProjectPanel(projKey) {
  detailEl.innerHTML = projectPanelHTML(projKey, currentLang);
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  // Back button → return to project list
  document.getElementById('proj-back-btn')?.addEventListener('click', () => {
    openDetail('projects');
  });

  // Carousel scroll → update dots
  const carousel = document.getElementById('proj-carousel');
  const dotsWrap = document.getElementById('carousel-dots');
  if (carousel && dotsWrap) {
    const dots = dotsWrap.querySelectorAll('span');
    carousel.addEventListener('scroll', () => {
      const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }, { passive: true });
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () =>
        carousel.scrollTo({ left: i * carousel.offsetWidth, behavior: 'smooth' })
      );
    });
  }
}

// ── Toggle a trigger ──
function onTriggerClick(key) {
  if (currentDetail === key) {
    currentDetail = null;
    detailEl.classList.remove('visible');
    setActiveTrigger(null);
  } else {
    currentDetail = key;
    setActiveTrigger(key);
    openDetail(key);
  }
}

function setActiveTrigger(key) {
  document.querySelectorAll('.trigger').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key)
  );
}

// ── Full render (called on boot + language switch) ──
function render(lang) {
  const t = CONTENT[lang];
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  nameEl.textContent = t.name;
  bioEl.innerHTML    = t.bio.map(p => `<p>${p}</p>`).join('');

  // Footer links
  footerLinks.innerHTML = t.footer
    .map(l => `<a href="${l.href}">${l.label}</a>`)
    .join('');

  // Attach bio trigger clicks
  document.querySelectorAll('.trigger').forEach(el =>
    el.addEventListener('click', () => onTriggerClick(el.dataset.key))
  );

  // Re-render open detail in new language
  if (currentDetail) {
    setActiveTrigger(currentDetail);
    openDetail(currentDetail);
  } else {
    detailEl.classList.remove('visible');
  }

  // Active lang button
  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );
}

// ── Language buttons ──
document.querySelectorAll('.lang-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    render(currentLang);
  })
);

// ── Boot ──
render('en');
</script>
</body>
</html>

       FONT SWAP — only touch these lines to change fonts
       ═══════════════════════════════════════════════════════════
       1. Upload your .otf to the repo root
       2. Change the filename in the src: url() below  ← EDIT
       3. Done — --font-latin already points to 'LatinFont'
    ═══════════════════════════════════════════════════════════ */
    @font-face {
      font-family: 'LatinFont';
      src: url('ABCOtto-Regular-Trial.otf') format('opentype'); /* ← EDIT filename */
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Lenos';
      src: url('LenosMedium.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'GT-Walsheim';
      src: url('GT-Walsheim-Pro-Light.ttf') format('truetype');
      font-weight: 900; font-style: normal; font-display: swap;
    }

    :root {
      --font-latin:  'LatinFont', 'Hanken Grotesk', 'Helvetica Neue', sans-serif; /* ← EDIT 'LatinFont' if you rename */
      --font-arabic: 'Lenos', 'Noto Naskh Arabic', serif;
      --font-sr:     'GT-Walsheim', 'Hanken Grotesk', sans-serif;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:     #111;
      --bg:       #f7f5f0;
      --muted:    #888;
      --rule:     #ccc;
      --ph:       1.2rem;
      --footer-h: 3.5rem;
    }

    html { font-size: 18px; }

    body {
      font-family: var(--font-latin);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1.2rem var(--ph) 0;
      padding-bottom: calc(var(--footer-h) + 1.5rem);
    }

    html[lang="ar"] body { font-family: var(--font-arabic); line-height: 1.85; font-size: 1.05rem; }
    html[lang="sr"] body { font-family: var(--font-sr);     line-height: 1.4;  letter-spacing: -0.01em; }

    /* ── Bio ── */
    #bio { font-size: clamp(1.4rem, 3.2vw, 2rem); }
    #bio p { display: inline; }
    #bio p::after { content: ' '; }

    /* ── Triggers ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.4; }
    .trigger.active { opacity: 0.4; }

    /* ── Detail panel ── */
    #detail-area {
      display: none;
      margin-top: 0.35em;
      padding-top: 0;
      border-top: none;
      color: var(--muted);
    }
    #detail-area.visible { display: block; animation: drop 0.15s ease; }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-heading {
      font-size: 0.66rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    html[lang="ar"] .panel-heading { letter-spacing: 0; }

    #detail-area p   { font-size: 1rem; margin-bottom: 0.3rem; color: var(--muted); }
    #detail-area a   { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
    #detail-area a:hover { color: var(--text); }

    /* Lists with year column */
    .item-list      { list-style: none; padding: 0; }
    .item-list li   { display: flex; gap: 1.5rem; margin-bottom: 0.25rem; font-size: 1rem; align-items: baseline; color: var(--muted); }
    .item-list .year { color: var(--muted); min-width: 4rem; flex-shrink: 0; opacity: 0.7; }

    /* Lists without year column (philology, contact) */
    .plain-list     { list-style: none; padding: 0; }
    .plain-list li  { margin-bottom: 0.25rem; font-size: 1rem; color: var(--muted); }

    /* Clickable sub-items */
    .sub-trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .sub-trigger:hover { opacity: 0.4; }

    /* Sub-panel (image viewer) */
    .sub-back {
      display: inline-block; font-size: 0.75rem; color: var(--muted);
      cursor: pointer; margin-bottom: 1rem;
      background: none; border: none; padding: 0; font-family: inherit;
      transition: opacity 0.15s;
    }
    .sub-back:hover { opacity: 0.5; }
    .sub-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.35rem; color: var(--muted); }
    .sub-desc  { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.1rem; max-width: 52ch; }

    /* Game iframe */
    .game-wrap { display:none; margin-top:0.75rem; width:100%; max-width:600px; }
    .game-wrap iframe { width:100%; aspect-ratio:16/9; border:none; display:block; }
    .game-wrap.open { display:block; }

    /* Lightbox */
    dialog#lb { border: none; background: transparent; padding: 0; max-width: 92vw; max-height: 92vh; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); margin: 0; }
    dialog#lb::backdrop { background: rgba(0,0,0,0.82); }
    dialog#lb img { display: block; max-width: 92vw; max-height: 88vh; object-fit: contain; }
    dialog#lb .lb-close {
      position: fixed; top: 1rem; right: 1.2rem;
      background: none; border: none; color: #fff; font-size: 1.4rem;
      cursor: pointer; opacity: 0.7; font-family: inherit; line-height: 1;
    }
    dialog#lb .lb-close:hover { opacity: 1; }

    /* Image grid */
    .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; max-width: 600px; }
    .img-grid img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #e0ddd7; }
    .img-grid img[src$=".gif"] { aspect-ratio: unset; object-fit: contain; background: none; }
    .img-grid img:last-child:nth-child(odd) { grid-column: 1 / -1; }

    /* Carousel */
    .img-carousel {
      display: none; overflow-x: scroll; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0.5rem;
    }
    .img-carousel::-webkit-scrollbar { display: none; }
    .img-carousel img {
      flex-shrink: 0; width: 80vw; max-width: 320px; aspect-ratio: 4/3;
      object-fit: cover; scroll-snap-align: start; background: #e0ddd7;
    }
    .carousel-dots { display: none; justify-content: center; gap: 0.35rem; margin-top: 0.6rem; }
    .carousel-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--rule); cursor: pointer; transition: background 0.2s; }
    .carousel-dots span.active { background: var(--text); }

    @media (max-width: 600px) {
      .img-grid { display: none; }
      .img-carousel { display: flex; }
      .carousel-dots { display: flex; }
    }

    /* ── Fixed footer ── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--footer-h);
      background: var(--bg);
      border-top: 3px solid #111;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 var(--ph);
      gap: 0.5rem;
      z-index: 100;
    }

    .footer-left { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--muted); }
    .footer-left a { color: inherit; text-decoration: none; white-space: nowrap; }
    .footer-left a:hover { text-decoration: underline; }

    .footer-centre { display: flex; justify-content: center; }
    .logo-link { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; opacity: 0.4; transition: opacity 0.2s; }
    .logo-link:hover { opacity: 1; }
    .logo-link svg, .logo-link img { width: 100%; height: 100%; display: block; object-fit: contain; }

    .footer-right { display: flex; justify-content: flex-end; align-items: center; gap: 0.45rem; }
    .lang-btn { cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; font-size: 0.85rem; color: var(--muted); transition: color 0.15s; }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { font-size: 0.85rem; color: var(--rule); user-select: none; }

    @media (max-width: 480px) {
      :root { --ph: 1rem; --footer-h: 2.5rem; }
      html  { font-size: 16px; }
    }
    @media (min-width: 768px) {
      .desktop-logo {
        display: block;
        position: fixed;
        right: -2vw;
        left: auto;
        bottom: 0;
        width: clamp(154px, 19.6vw, 294px);
        opacity: 1;
        mix-blend-mode: multiply;
        pointer-events: none;
        user-select: none;
        z-index: 0;
        transition: left 0.2s, right 0.2s;
      }
      .desktop-logo.ar-side {
        right: auto;
        left: -2vw;
        transform: scaleX(-1);
      }
    }
    @media (max-width: 767px) {
      .desktop-logo { display: none; }
    }
  </style>
</head>

// ═══════════════ ENGINE ═══════════════

let currentLang   = 'en';
let currentDetail = null;

const bioEl       = document.getElementById('bio');
const detailEl    = document.getElementById('detail-area');
const footerLinks = document.getElementById('footer-links');
const htmlEl      = document.documentElement;

function imageSubPanelHTML(key, title, desc, backKey) {
  const imgs      = IMAGES[key] || [];
  const video     = VIDEOS[key] || null;
  const videos    = VIDEO_LIST[key] || [];
  const game      = GAMES[key]  || null;
  const backLabel = CONTENT[currentLang].backLabel[backKey] || '←';
  const grid      = imgs.map(s => `<img src="${s}" alt="${title}" loading="lazy" decoding="async" style="cursor:zoom-in" onclick="document.getElementById('lb-img').src=this.src;document.getElementById('lb').showModal()">`).join('');
  const carousel  = imgs.map(s => `<img src="${s}" alt="${title}" loading="lazy" decoding="async">`).join('');
  const dots      = imgs.map((_, i) => `<span class="${i===0?'active':''}" data-dot="${i}"></span>`).join('');
  const videoHTML = video
    ? `<video controls preload="metadata" style="width:100%;max-width:600px;display:block;margin-top:0.75rem"><source src="${video}" type="video/mp4"></video>`
    : videos.map(v => `<video controls preload="metadata" style="width:100%;max-width:600px;display:block;margin-top:0.75rem"><source src="${v}"></video>`).join('');
  const gameHTML  = game
    ? `<p style="margin-top:0.75rem"><a href="${game}" target="_blank" rel="noopener" class="sub-trigger" style="color:var(--muted)">press here to play!</a></p>`
    : '';
  return `
    <button class="sub-back" data-parent="${backKey}">${backLabel}</button>
    <p class="sub-title">${title}</p>
    ${desc ? `<p class="sub-desc">${desc}</p>` : ''}
    ${gameHTML}
    ${imgs.length ? `<div class="img-grid">${grid}</div><div class="img-carousel" id="sub-carousel">${carousel}</div><div class="carousel-dots" id="sub-dots">${dots}</div>` : ''}
    ${videoHTML}`;
}

function projectPanelHTML(key, title, desc, backKey, panelImages) {
  const backLabel = CONTENT[currentLang].backLabel[backKey] || '←';
  const hasGallery = IMAGES[key] && IMAGES[key].length;
  const galleryLink = hasGallery
    ? `<p style="margin-top:0.75rem"><span class="sub-trigger" data-key="${key}" data-backkey="${backKey}" data-title="${title}" data-desc="${desc}" data-mode="gallery">gallery of generations</span></p>`
    : '';
  const panelImgs = panelImages ? (IMAGES[panelImages] || []) : [];
  const panelCarousel = panelImgs.map(s => `<img src="${s}" alt="${title}" loading="lazy" decoding="async">`).join('');
  const panelDots = panelImgs.map((_, i) => `<span class="${i===0?'active':''}" data-dot="${i}"></span>`).join('');
  const panelGrid = panelImgs.length
    ? `<div class="img-grid" style="margin-top:0.75rem">${panelImgs.map(s => `<img src="${s}" alt="${title}" loading="lazy" style="cursor:zoom-in" onclick="document.getElementById('lb-img').src=this.src;document.getElementById('lb').showModal()">`).join('')}</div><div class="img-carousel" id="sub-carousel" style="margin-top:0.75rem">${panelCarousel}</div><div class="carousel-dots" id="sub-dots">${panelDots}</div>`
    : '';
  return `
    <button class="sub-back" data-parent="${backKey}">${backLabel}</button>
    <p class="sub-title">${title}</p>
    ${desc ? `<p class="sub-desc">${desc}</p>` : ''}
    ${galleryLink}
    ${panelGrid}`;
}


function attachCarousel() {
  const carousel = document.getElementById('sub-carousel');
  const dotsWrap = document.getElementById('sub-dots');
  if (!carousel || !dotsWrap) return;
  const dots = dotsWrap.querySelectorAll('span');
  carousel.addEventListener('scroll', () => {
    const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
  dots.forEach((dot, i) =>
    dot.addEventListener('click', () =>
      carousel.scrollTo({ left: i * carousel.offsetWidth, behavior: 'smooth' })
    )
  );
}

function attachGameTriggers() {
  detailEl.querySelectorAll('[data-mode="game"]').forEach(el => {
    el.addEventListener('click', () => {
      const wrap  = detailEl.querySelector('[id^="game-wrap-"]');
      const frame = detailEl.querySelector('[id^="game-frame-"]');
      if (wrap && frame) {
        wrap.classList.toggle('open');
        if (wrap.classList.contains('open') && !frame.src) {
          frame.src = el.dataset.game;
        }
      }
    });
  });
}

function openDetail(key) {
  const d = CONTENT[currentLang].details[key];
  if (!d) return;

  let html = '';

  if (d.type === 'html') {
    html = d.html;
  } else if (d.type === 'projects') {
    const rows = d.items.map(item => {
      const yearSpan = item.year ? `<span class="year">${item.year}</span>` : '';
      if (item.plain) {
        return `<li>${yearSpan}<span style="color:var(--muted)">${item.title}</span></li>`;
      }
      return `<li>${yearSpan}<span class="sub-trigger" data-key="${item.key}" data-backkey="${d.backKey}" data-title="${item.title}" data-desc="${item.desc}"${item.direct ? ' data-direct="1"' : ''}${item.panelImages ? ` data-panel-images="${item.panelImages}"` : ''}>${item.title}</span></li>`;
    }).join('');
    html = `<ul class="item-list">${rows}</ul>`;
  } else if (d.type === 'philology') {
    const rows = d.items.map(item => {
      if (item.type === 'link') {
        return `<li><a href="${item.href}" target="_blank" rel="noopener">${item.title}</a></li>`;
      }
      if (item.type === 'plain') {
        return `<li><span style="color:var(--muted)">${item.title}</span></li>`;
      }
      return `<li><span class="sub-trigger" data-key="${item.key}" data-backkey="${d.backKey}" data-title="${item.title}" data-desc="${item.desc||''}"${item.direct ? ' data-direct="1"' : ''}>${item.title}</span></li>`;
    }).join('');
    html = `<ul class="plain-list">${rows}</ul>`;
  }

  detailEl.innerHTML = html;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  detailEl.querySelectorAll('.sub-trigger').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.mode === 'game') {
        // toggle iframe open
        const wrap = detailEl.querySelector('[id^="game-wrap-"]');
        const frame = detailEl.querySelector('[id^="game-frame-"]');
        if (wrap && frame) {
          wrap.classList.toggle('open');
          if (wrap.classList.contains('open') && !frame.src) {
            frame.src = el.dataset.game;
          }
        }
      } else if (el.dataset.mode === 'gallery' || el.dataset.direct === '1') {
        detailEl.innerHTML = imageSubPanelHTML(el.dataset.key, el.dataset.title, el.dataset.desc, el.dataset.backkey);
        detailEl.classList.remove('visible');
        void detailEl.offsetWidth;
        detailEl.classList.add('visible');
        attachCarousel();
        attachGameTriggers();
        detailEl.querySelector('.sub-back')?.addEventListener('click', e => {
          openDetail(e.target.dataset.parent);
        });
      } else {
        detailEl.innerHTML = projectPanelHTML(el.dataset.key, el.dataset.title, el.dataset.desc, el.dataset.backkey, el.dataset.panelImages);
        detailEl.classList.remove('visible');
        void detailEl.offsetWidth;
        detailEl.classList.add('visible');
        detailEl.querySelector('.sub-back')?.addEventListener('click', e => {
          openDetail(e.target.dataset.parent);
        });
        detailEl.querySelectorAll('.sub-trigger').forEach(inner => {
          inner.addEventListener('click', () => {
            detailEl.innerHTML = imageSubPanelHTML(inner.dataset.key, inner.dataset.title, inner.dataset.desc, inner.dataset.backkey);
            detailEl.classList.remove('visible');
            void detailEl.offsetWidth;
            detailEl.classList.add('visible');
            attachCarousel();
            detailEl.querySelector('.sub-back')?.addEventListener('click', e => {
              openDetail(e.target.dataset.parent);
            });
          });
        });
      }
    });
  });
}

function onTriggerClick(key) {
  if (currentDetail === key) {
    currentDetail = null;
    detailEl.classList.remove('visible');
    document.querySelectorAll('.trigger').forEach(el => el.classList.remove('active'));
  } else {
    currentDetail = key;
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === key)
    );
    openDetail(key);
  }
}

function render(lang) {
  const t = CONTENT[lang];
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  bioEl.innerHTML       = `<p>${t.bio}</p>`;
  footerLinks.innerHTML = t.footer.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

  document.querySelectorAll('.trigger').forEach(el =>
    el.addEventListener('click', () => onTriggerClick(el.dataset.key))
  );

  if (currentDetail) {
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === currentDetail)
    );
    openDetail(currentDetail);
  } else {
    detailEl.classList.remove('visible');
  }

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );

  const deskLogo = document.querySelector('.desktop-logo');
  if (deskLogo) deskLogo.classList.toggle('ar-side', lang === 'ar');
}

document.querySelectorAll('.lang-btn').forEach(btn =>
  btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(currentLang); })
);

document.getElementById('lb').addEventListener('click', function(e) {
  if (e.target === this) this.close();
});

render('en');
</script>
</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:  #111;
      --bg:    #f7f5f0;
      --muted: #888;
      --rule:  #ccc;
      /* Körner uses ~20px padding — very tight to the edge */
      --ph: 1.2rem;
    }

    :root {
      --font-latin:  'Hanken Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-arabic: 'Noto Naskh Arabic', serif;
    }

    @font-face {
      font-family: 'GT-Walsheim';
      src: url('GT-Walsheim-Pro-Black.ttf') format('truetype');
      font-weight: 900; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Lenos';
      src: url('LenosMedium.otf') format('opentype');
      font-weight: 400; font-style: normal; font-display: swap;
    }

    html { font-size: 18px; }

    body {
      font-family: var(--font-latin);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      /* Minimal top padding — text starts near the very top */
      padding: 1.2rem var(--ph) 0;
    }

    html[lang="ar"] body { font-family: 'Lenos', var(--font-arabic); line-height: 1.85; font-size: 1.05rem; }
    html[lang="sr"] body { font-family: 'GT-Walsheim', var(--font-latin); line-height: 1.4; letter-spacing: -0.01em; }

    /* ── Bio: ONE continuous paragraph, full width, no max-width ── */
    #bio {
      font-size: clamp(1.1rem, 2.4vw, 1.55rem);
    }
    /* Single <p> — no breaks between sentences */
    #bio p { display: inline; }
    #bio p::after { content: ' '; }

    /* ── Triggers ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.4; }
    .trigger.active { opacity: 0.4; }

    /* ── Detail panel ── */
    #detail-area {
      display: none;
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--rule);
    }
    #detail-area.visible { display: block; animation: drop 0.2s ease; }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-heading {
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }
    html[lang="ar"] .panel-heading { letter-spacing: 0; }

    #detail-area p   { font-size: 0.9rem; margin-bottom: 0.4rem; }
    #detail-area a   { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

    /* ── List used in multiple panels ── */
    .item-list      { list-style: none; padding: 0; }
    .item-list li   { display: flex; gap: 1.5rem; margin-bottom: 0.3rem; font-size: 0.9rem; align-items: baseline; }
    .item-list .year { color: var(--muted); min-width: 4rem; flex-shrink: 0; }

    /* Clickable list item (opens image sub-panel) */
    .sub-trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .sub-trigger:hover { opacity: 0.4; }

    /* ── Sub-panel (project / philology detail) ── */
    .sub-back {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 1rem;
      background: none; border: none;
      padding: 0; font-family: inherit;
      transition: opacity 0.15s;
    }
    .sub-back:hover { opacity: 0.5; }

    .sub-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.35rem; }
    .sub-desc  { font-size: 0.85rem; color: #555; margin-bottom: 1.1rem; max-width: 52ch; }

    /* ── Image grid (desktop) ── */
    .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; max-width: 600px; }
    .img-grid img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #e0ddd7; }
    .img-grid img:last-child:nth-child(odd) { grid-column: 1 / -1; }

    /* ── Carousel (mobile) ── */
    .img-carousel {
      display: none;
      overflow-x: scroll; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 0.5rem;
    }
    .img-carousel::-webkit-scrollbar { display: none; }
    .img-carousel img {
      flex-shrink: 0; width: 80vw; max-width: 320px;
      aspect-ratio: 4/3; object-fit: cover;
      scroll-snap-align: start; background: #e0ddd7;
    }
    .carousel-dots { display: none; justify-content: center; gap: 0.35rem; margin-top: 0.6rem; }
    .carousel-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--rule); cursor: pointer; transition: background 0.2s; }
    .carousel-dots span.active { background: var(--text); }

    @media (max-width: 600px) {
      .img-grid      { display: none; }
      .img-carousel  { display: flex; }
      .carousel-dots { display: flex; }
    }

    /* ══ FOOTER: left · centre · right ══ */
    footer {
      margin-top: 3.5rem;
      padding: 1.25rem var(--ph) 2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 1rem;
    }

    .footer-left {
      display: flex; flex-direction: column; gap: 0.2rem;
      font-size: 0.75rem; color: var(--muted);
    }
    .footer-left a { color: inherit; text-decoration: none; }
    .footer-left a:hover { text-decoration: underline; }

    .footer-centre { display: flex; justify-content: center; align-items: flex-end; }
    .logo-link {
      display: block; width: 34px; height: 34px;
      opacity: 0.45; transition: opacity 0.2s;
    }
    .logo-link:hover { opacity: 1; }
    .logo-link svg, .logo-link img { width: 100%; height: 100%; display: block; }

    .footer-right {
      display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem;
    }
    .lang-btn {
      cursor: pointer; background: none; border: none; padding: 0;
      font-family: inherit; font-size: 0.75rem; color: var(--muted);
      transition: color 0.15s;
    }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { font-size: 0.75rem; color: var(--rule); user-select: none; }

    @media (max-width: 640px) {
      html  { font-size: 16px; }
      body  { padding-top: 1rem; }
      footer {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .footer-centre {
        grid-column: 1 / -1;
        justify-content: flex-start;
        margin-bottom: 0.75rem;
      }
    }
  </style>

//  ENGINE
// ════════════════════════════════════════════════════════════════

let currentLang   = 'en';
let currentDetail = null;   // which top-level trigger is open
let currentParent = null;   // which panel to return to from a sub-panel

const bioEl       = document.getElementById('bio');
const detailEl    = document.getElementById('detail-area');
const footerLinks = document.getElementById('footer-links');
const htmlEl      = document.documentElement;

// ── Build image sub-panel (project or philology work) ──
function imageSubPanelHTML(key, title, desc, parentKey) {
  const imgs      = IMAGES[key] || [];
  const backLabel = CONTENT[currentLang].backLabel[parentKey] || '←';
  const grid      = imgs.map(s => `<img src="${s}" alt="${title}" loading="lazy">`).join('');
  const carousel  = imgs.map(s => `<img src="${s}" alt="${title}" loading="lazy">`).join('');
  const dots      = imgs.map((_, i) => `<span class="${i===0?'active':''}" data-dot="${i}"></span>`).join('');
  return `
    <button class="sub-back" data-parent="${parentKey}">${backLabel}</button>
    <p class="sub-title">${title}</p>
    ${desc ? `<p class="sub-desc">${desc}</p>` : ''}
    <div class="img-grid">${grid}</div>
    <div class="img-carousel" id="sub-carousel">${carousel}</div>
    <div class="carousel-dots" id="sub-dots">${dots}</div>`;
}

// ── Attach carousel events after rendering sub-panel ──
function attachCarousel() {
  const carousel = document.getElementById('sub-carousel');
  const dotsWrap = document.getElementById('sub-dots');
  if (!carousel || !dotsWrap) return;
  const dots = dotsWrap.querySelectorAll('span');
  carousel.addEventListener('scroll', () => {
    const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
  dots.forEach((dot, i) =>
    dot.addEventListener('click', () =>
      carousel.scrollTo({ left: i * carousel.offsetWidth, behavior: 'smooth' })
    )
  );
}

// ── Render a detail panel by key ──
function openDetail(key) {
  const d = CONTENT[currentLang].details[key];
  if (!d) return;

  let html = `<p class="panel-heading">${d.heading}</p>`;

  if (d.type === 'html') {
    html += d.html;

  } else if (d.type === 'projects') {
    const rows = d.items.map(item =>
      `<li><span class="year">${item.year}</span><span class="sub-trigger" data-key="${item.key}" data-parent="${key}" data-title="${item.title}" data-desc="${item.desc}">${item.title}</span></li>`
    ).join('');
    html += `<ul class="item-list">${rows}</ul>`;

  } else if (d.type === 'philology') {
    const rows = d.items.map(item => {
      if (item.type === 'link') {
        return `<li><span class="year"></span><a href="${item.href}" target="_blank" rel="noopener">${item.title}</a></li>`;
      } else {
        return `<li><span class="year"></span><span class="sub-trigger" data-key="${item.key}" data-parent="${key}" data-title="${item.title}" data-desc="${item.desc||''}">${item.title}</span></li>`;
      }
    }).join('');
    html += `<ul class="item-list">${rows}</ul>`;
  }

  detailEl.innerHTML = html;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  // Attach sub-item click handlers
  detailEl.querySelectorAll('.sub-trigger').forEach(el => {
    el.addEventListener('click', () => {
      const parentKey = el.dataset.parent;
      currentParent   = parentKey;
      detailEl.innerHTML = imageSubPanelHTML(el.dataset.key, el.dataset.title, el.dataset.desc, parentKey);
      detailEl.classList.remove('visible');
      void detailEl.offsetWidth;
      detailEl.classList.add('visible');
      attachCarousel();
      // Back button
      detailEl.querySelector('.sub-back')?.addEventListener('click', e => {
        openDetail(e.target.dataset.parent);
      });
    });
  });
}

// ── Toggle a top-level trigger ──
function onTriggerClick(key) {
  if (currentDetail === key) {
    currentDetail = null;
    detailEl.classList.remove('visible');
    document.querySelectorAll('.trigger').forEach(el => el.classList.remove('active'));
  } else {
    currentDetail = key;
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === key)
    );
    openDetail(key);
  }
}

// ── Full render ──
function render(lang) {
  const t = CONTENT[lang];
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  // Single paragraph — wrap bio string in one <p>
  bioEl.innerHTML = `<p>${t.bio}</p>`;

  footerLinks.innerHTML = t.footer.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

  document.querySelectorAll('.trigger').forEach(el =>
    el.addEventListener('click', () => onTriggerClick(el.dataset.key))
  );

  if (currentDetail) {
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === currentDetail)
    );
    openDetail(currentDetail);
  } else {
    detailEl.classList.remove('visible');
  }

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );
}

document.querySelectorAll('.lang-btn').forEach(btn =>
  btn.addEventListener('click', () => { currentLang = btn.dataset.lang; render(currentLang); })
);

render('en');
</script>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ══════════════════════════════════════════════
       SEO METADATA — edit these 6 lines
       ══════════════════════════════════════════════ -->
  <title>Your Name</title>
  <meta name="description" content="One sentence about who you are — shown in Google results." />
  <meta property="og:title"       content="Your Name" />
  <meta property="og:description" content="One sentence about who you are." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://yourusername.github.io" />
  <!-- Uncomment for a link-preview thumbnail (1200×630px):
  <meta property="og:image" content="https://yourusername.github.io/og.jpg" /> -->
  <link rel="canonical" href="https://yourusername.github.io" />
  <!-- ══════════════════════════════════════════════ -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --text:  #111;
      --bg:    #f7f5f0;
      --muted: #888;
      --rule:  #ccc;
      --max:   520px;
      --ph:    1.75rem;
    }

    html { font-size: 18px; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 3.5rem var(--ph) 5rem;
    }

    html[lang="ar"] body {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1.05rem;
      line-height: 1.95;
    }

    main   { max-width: var(--max); margin: 0 auto; }
    footer { max-width: var(--max); margin: 2.5rem auto 0; }

    /* ── Name heading ── */
    h1 {
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.01em;
    }

    /* ── Bio ── */
    #bio p { margin-bottom: 0.3em; }

    /* ── Trigger words ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.45; }
    .trigger.active { opacity: 0.45; }

    /* ── Detail panel (below all bio text) ── */
    #detail-area {
      display: none;
      margin-top: 2rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--rule);
    }
    #detail-area.visible {
      display: block;
      animation: drop 0.2s ease;
    }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Detail: generic styles ── */
    #detail-area .panel-heading {
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    html[lang="ar"] #detail-area .panel-heading { letter-spacing: 0; }

    #detail-area p {
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
    }

    #detail-area a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Project list (shown when "projects" trigger clicked) ── */
    .project-list {
      list-style: none;
      padding: 0;
    }
    .project-list li {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.25rem;
      font-size: 0.92rem;
    }
    .project-list .year {
      color: var(--muted);
      min-width: 4.5rem;
      flex-shrink: 0;
    }
    /* Project name is itself a trigger */
    .project-list .proj-trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .project-list .proj-trigger:hover { opacity: 0.45; }

    /* ── Project detail panel ── */
    .proj-back {
      display: inline-block;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: 1.2rem;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .proj-back:hover { opacity: 0.55; }

    .proj-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .proj-desc {
      font-size: 0.92rem;
      color: #444;
      margin-bottom: 1.25rem;
      max-width: 42ch;
    }

    /* ── Image grid (desktop) ── */
    .img-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .img-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #e0ddd7;
    }

    /* Single image spans full width */
    .img-grid img:only-child { grid-column: 1 / -1; }

    /* Odd last image (3, 5…) spans full width */
    .img-grid img:last-child:nth-child(odd) { grid-column: 1 / -1; }

    /* ── Carousel (mobile) ── */
    .img-carousel {
      display: none; /* hidden on desktop */
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0.5rem;
    }
    .img-carousel::-webkit-scrollbar { display: none; }

    .img-carousel img {
      flex-shrink: 0;
      width: 82vw;
      max-width: 340px;
      aspect-ratio: 4/3;
      object-fit: cover;
      scroll-snap-align: start;
      background: #e0ddd7;
    }

    /* Carousel dots */
    .carousel-dots {
      display: none;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 0.6rem;
    }
    .carousel-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--rule);
      transition: background 0.2s;
    }
    .carousel-dots span.active { background: var(--text); }

    /* ── Switch grid → carousel on mobile ── */
    @media (max-width: 600px) {
      .img-grid     { display: none; }
      .img-carousel { display: flex; }
      .carousel-dots { display: flex; }
    }

    /* ── Language switcher ── */
    #lang-switcher {
      margin-top: 2.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .lang-btn {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: inherit;
      color: var(--muted);
      transition: color 0.15s;
    }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { color: var(--rule); user-select: none; }

    /* ── Footer ── */
    footer {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Mobile layout tweaks ── */
    @media (max-width: 600px) {
      :root { --ph: 1.25rem; }
      html  { font-size: 17px; }
      body  { padding-top: 2.5rem; padding-bottom: 4rem; }
    }
    @media (max-width: 380px) {
      :root { --ph: 1rem; }
      html  { font-size: 16px; }
    }
  </style>
</head>
<body>

<main>
  <h1 id="site-name">Your Name</h1>
  <div id="bio"></div>
  <div id="detail-area" aria-live="polite"></div>
  <nav id="lang-switcher" aria-label="Language">
    <button class="lang-btn active" data-lang="en">EN</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="de">DE</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="ar">AR</button>

<footer id="site-footer"></footer>

// ════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════
//  ENGINE
// ════════════════════════════════════════════════════════════════

let currentLang   = 'en';
let currentDetail = null;  // key of currently open panel

const bioEl    = document.getElementById('bio');
const detailEl = document.getElementById('detail-area');
const nameEl   = document.getElementById('site-name');
const footerEl = document.getElementById('site-footer');
const htmlEl   = document.documentElement;

// Build the projects list panel HTML
function projectsListHTML() {
  const rows = PROJECTS.map(p =>
    `<li>
      <span class="year">${p.year}</span>
      <span class="proj-trigger" data-proj="${p.key}">${p.title}</span>
    </li>`
  ).join('');
  return `<ul class="project-list">${rows}</ul>`;
}

// Build a single project panel HTML
function projectPanelHTML(proj) {
  const lang   = CONTENT[currentLang];
  const imgsSrc = proj.images;

  // Grid (desktop)
  const gridImgs = imgsSrc.map(src =>
    `<img src="${src}" alt="${proj.title}" loading="lazy" />`
  ).join('');

  // Carousel (mobile) + dots
  const carouselImgs = imgsSrc.map(src =>
    `<img src="${src}" alt="${proj.title}" loading="lazy" />`
  ).join('');
  const dots = imgsSrc.map((_, i) =>
    `<span class="${i === 0 ? 'active' : ''}" data-dot="${i}"></span>`
  ).join('');

  return `
    <button class="proj-back" id="proj-back-btn">${lang.backLabel}</button>
    <p class="proj-title">${proj.title}</p>
    <p class="proj-desc">${proj.desc}</p>
    <div class="img-grid">${gridImgs}</div>
    <div class="img-carousel" id="proj-carousel">${carouselImgs}</div>
    <div class="carousel-dots" id="carousel-dots">${dots}</div>
  `;
}

function openDetail(key) {
  const lang = CONTENT[currentLang];

  let html = '';
  let heading = '';

  if (key === 'projects') {
    heading = currentLang === 'ar' ? 'المشاريع' : currentLang === 'de' ? 'Projekte' : 'Projects';
    html = `<p class="panel-heading">${heading}</p>` + projectsListHTML();
  } else if (CONTENT[currentLang].details[key]) {
    const d = CONTENT[currentLang].details[key];
    html = `<p class="panel-heading">${d.heading}</p>${d.html}`;
  }

  if (!html) return;

  detailEl.innerHTML = html;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth;
  detailEl.classList.add('visible');

  // Attach project-list item clicks
  detailEl.querySelectorAll('.proj-trigger').forEach(el => {
    el.addEventListener('click', () => {
      const proj = PROJECTS.find(p => p.key === el.dataset.proj);
      if (!proj) return;
      detailEl.innerHTML = projectPanelHTML(proj);
      detailEl.classList.remove('visible');
      void detailEl.offsetWidth;
      detailEl.classList.add('visible');
      attachProjectPanelEvents();
    });
  });
}

function attachProjectPanelEvents() {
  // Back button
  const backBtn = document.getElementById('proj-back-btn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      openDetail('projects');
      // keep current detail key as 'projects'
      currentDetail = 'projects';
      updateActiveTriggers('projects');
    });
  }

  // Carousel scroll → update dots
  const carousel = document.getElementById('proj-carousel');
  const dotsEl   = document.getElementById('carousel-dots');
  if (carousel && dotsEl) {
    const dots = dotsEl.querySelectorAll('span');
    carousel.addEventListener('scroll', () => {
      const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }, { passive: true });

    // Dots click → scroll
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        carousel.scrollTo({ left: i * carousel.offsetWidth, behavior: 'smooth' });
      });
    });
  }
}

function updateActiveTriggers(key) {
  document.querySelectorAll('.trigger').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key)
  );
}

function onTriggerClick(key) {
  if (currentDetail === key) {
    // Close
    currentDetail = null;
    detailEl.classList.remove('visible');
    updateActiveTriggers(null);
  } else {
    currentDetail = key;
    updateActiveTriggers(key);
    openDetail(key);
  }
}

function render(lang) {
  const t = CONTENT[lang];
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  nameEl.textContent = t.name;
  bioEl.innerHTML    = t.bio.map(p => `<p>${p}</p>`).join('');
  footerEl.innerHTML = t.footer;

  document.querySelectorAll('.trigger').forEach(el => {
    el.addEventListener('click', () => onTriggerClick(el.dataset.key));
  });

  // Re-render open panel in new language
  if (currentDetail) {
    updateActiveTriggers(currentDetail);
    openDetail(currentDetail);
  } else {
    detailEl.classList.remove('visible');
  }

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    render(currentLang);
  });
});

render('en');
</script>
</body>
</html>

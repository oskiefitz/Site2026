<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ══════════════════════════════════════════════
       SEO METADATA — edit everything in this block
       ══════════════════════════════════════════════ -->
  <title>Your Name</title>
  <meta name="description" content="One sentence about who you are — shown in Google results." />

  <!-- Open Graph: controls how your link looks when shared on WhatsApp, iMessage, etc. -->
  <meta property="og:title"       content="Your Name" />
  <meta property="og:description" content="One sentence about who you are." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://yourusername.github.io" />
  <!-- Uncomment + add an image for a thumbnail when your link is shared:
  <meta property="og:image"       content="https://yourusername.github.io/og.jpg" /> -->

  <!-- Tells search engines this is the definitive URL for this page -->
  <link rel="canonical" href="https://yourusername.github.io" />
  <!-- ══════════════════════════════════════════════ -->

  <!-- Fonts: EB Garamond for Latin, Noto Naskh Arabic for Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Naskh+Arabic:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens ── */
    :root {
      --text:  #111;
      --bg:    #f7f5f0;
      --muted: #888;
      --rule:  #ccc;
      --max:   520px;
      --ph:    1.75rem;   /* horizontal padding */
    }

    /* ── Base ── */
    html { font-size: 18px; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 3.5rem var(--ph) 5rem;
    }

    /* Arabic: swap font + tune for legibility */
    html[lang="ar"] body {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1.05rem;
      line-height: 1.95;
    }

    /* ── Layout ── */
    main   { max-width: var(--max); margin: 0 auto; }
    footer { max-width: var(--max); margin: 2.5rem auto 0; }

    /* ── Name heading ── */
    h1 {
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.01em;
    }

    /* ── Bio ── */
    #bio p { margin-bottom: 0.3em; }

    /* ── Trigger words ── */
    .trigger {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: opacity 0.15s;
    }
    .trigger:hover  { opacity: 0.45; }
    .trigger.active { opacity: 0.45; }

    /* ── Detail panel — below ALL bio text ── */
    #detail-area {
      display: none;
      margin-top: 2rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--rule);
    }
    #detail-area.visible {
      display: block;
      animation: drop 0.2s ease;
    }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #detail-area h2 {
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    /* uppercase tracking looks odd on Arabic */
    html[lang="ar"] #detail-area h2 { letter-spacing: 0; }

    #detail-area p {
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
    }

    #detail-area ul { list-style: none; padding: 0; }

    #detail-area ul li {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.25rem;
      font-size: 0.92rem;
    }

    #detail-area ul li .year {
      color: var(--muted);
      min-width: 4.5rem;
      flex-shrink: 0;
    }

    #detail-area a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Language switcher ── */
    #lang-switcher {
      margin-top: 2.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .lang-btn {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: inherit;
      color: var(--muted);
      transition: color 0.15s;
    }
    .lang-btn:hover  { color: var(--text); }
    .lang-btn.active { color: var(--text); font-style: italic; }
    .lang-sep        { color: var(--rule); user-select: none; }

    /* ── Footer ── */
    footer {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      :root { --ph: 1.25rem; }
      html  { font-size: 17px; }
      body  { padding-top: 2.5rem; padding-bottom: 4rem; }
    }
    @media (max-width: 380px) {
      :root { --ph: 1rem; }
      html  { font-size: 16px; }
    }
  </style>
</head>
<body>

  <div id="bio"></div>

  <!-- Detail panel — appears here, below all bio text -->
  <div id="detail-area" aria-live="polite"></div>

  <!-- Language switcher -->
  <nav id="lang-switcher" aria-label="Language">
    <button class="lang-btn active" data-lang="en">EN</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="de">DE</button>
    <span class="lang-sep" aria-hidden="true">·</span>
    <button class="lang-btn" data-lang="ar">AR</button>
  </nav>
</main>

<footer id="site-footer"></footer>

// ════════════════════════════════════════════════════════════════
//  ENGINE — no need to edit below this line
// ════════════════════════════════════════════════════════════════

let currentLang   = 'en';
let currentDetail = null;

const bioEl    = document.getElementById('bio');
const detailEl = document.getElementById('detail-area');
const nameEl   = document.getElementById('site-name');
const footerEl = document.getElementById('site-footer');
const htmlEl   = document.documentElement;

function showDetail(key) {
  const d = CONTENT[currentLang].details[key];
  if (!d) return;
  detailEl.innerHTML = `<h2>${d.heading}</h2>${d.html}`;
  detailEl.classList.remove('visible');
  void detailEl.offsetWidth; // force reflow so animation re-fires
  detailEl.classList.add('visible');
}

function onTriggerClick(key) {
  if (currentDetail === key) {
    // Same word clicked again — close
    currentDetail = null;
    detailEl.classList.remove('visible');
    document.querySelectorAll('.trigger').forEach(el => el.classList.remove('active'));
  } else {
    currentDetail = key;
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === key)
    );
    showDetail(key);
  }
}

function render(lang) {
  const t = CONTENT[lang];

  // Direction + lang attribute (CSS uses these for font/direction switching)
  htmlEl.lang = lang;
  htmlEl.dir  = t.dir;

  // Content
  nameEl.textContent = t.name;
  bioEl.innerHTML    = t.bio.map(p => `<p>${p}</p>`).join('');
  footerEl.innerHTML = t.footer;

  // Attach click handlers (bio was re-rendered so elements are new)
  document.querySelectorAll('.trigger').forEach(el => {
    el.addEventListener('click', () => onTriggerClick(el.dataset.key));
  });

  // If a detail was open, re-render it in the new language
  if (currentDetail && CONTENT[lang].details[currentDetail]) {
    showDetail(currentDetail);
    document.querySelectorAll('.trigger').forEach(el =>
      el.classList.toggle('active', el.dataset.key === currentDetail)
    );
  } else {
    currentDetail = null;
    detailEl.classList.remove('visible');
  }

  // Highlight active language button
  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.lang === lang)
  );
}

// Language button clicks
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    render(currentLang);
  });
});

// Initial render
render('en');
</script>

</html>
